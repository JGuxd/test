<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JGUXD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(46, 125, 50, 0.2);
            --accent-green: #2e7d32;
            --accent-green-glow: rgba(46, 125, 50, 0.4);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 1rem;
        }

        /* Subtle background grid & glowing decorative blobs */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: 1;
            pointer-events: none;
        }

        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-green-glow) 0%, transparent 70%);
            border-radius: 50%;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
            filter: blur(40px);
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 640px;
            z-index: 3;
            text-align: center;
        }

        /* Header Styling */
        header {
            margin-bottom: 3.5rem;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-primary);
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        .logo span {
            color: #4caf50; /* A slightly brighter green for contrast */
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* Navigation Cards List */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        /* Hover & Tap Animations */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .card:hover::before {
            transform: translateX(100%);
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #4caf50;
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.15), 0 0 1px 1px rgba(76, 175, 80, 0.2);
            background: rgba(17, 24, 39, 0.85);
        }

        .card:active {
            transform: translateY(-1px);
        }

        /* Card Content Inner Elements */
        .card-info {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            text-align: left;
        }

        .icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(46, 125, 50, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(46, 125, 50, 0.2);
            color: #4caf50;
            transition: all 0.3s ease;
        }

        .card:hover .icon-wrapper {
            background: #2e7d32;
            color: #ffffff;
            border-color: #4caf50;
            transform: scale(1.05);
        }

        .card-details h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            letter-spacing: -0.3px;
        }

        .card-details p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Arrow Icon */
        .arrow-icon {
            color: var(--text-secondary);
            transition: all 0.3s ease;
            transform: translateX(0);
        }

        .card:hover .arrow-icon {
            color: #4caf50;
            transform: translateX(5px);
        }

        /* Footer */
        footer {
            margin-top: 5rem;
            font-size: 0.85rem;
            color: rgba(156, 163, 175, 0.5);
            font-weight: 300;
            z-index: 3;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            body {
                padding: 1.5rem 1rem;
            }
            .logo {
                font-size: 2.75rem;
            }
            .card {
                padding: 1.25rem 1.5rem;
            }
            .icon-wrapper {
                width: 40px;
                height: 40px;
                border-radius: 10px;
            }
            .card-details h2 {
                font-size: 1.15rem;
            }
            .card-details p {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <!-- Decorative green lighting flare in background -->
    <div class="glow-orb"></div>

    <div class="container">
        
        <header>
            <h1 class="logo">JG<span>UXD</span></h1>
            <p class="tagline">CREATIVE PORTAL</p>
        </header>

        <main class="links-grid">

            <!-- Card 1: Portfolio -->
            <a href="/portfolio/" class="card">
                <div class="card-info">
                    <div class="icon-wrapper">
                        <!-- Briefcase Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </div>
                    <div class="card-details">
                        <h2>Portfolio</h2>
                        <p>Creative design, layout, and UX showcases</p>
                    </div>
                </div>
                <div class="arrow-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </div>
            </a>

            <!-- Card 2: PSA -->
            <a href="/psa/" class="card">
                <div class="card-info">
                    <div class="icon-wrapper">
                        <!-- Music/Vinyl Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/></svg>
                    </div>
                    <div class="card-details">
                        <h2>PSA</h2>
                        <p>Band updates, media assets, and news</p>
                    </div>
                </div>
                <div class="arrow-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </div>
            </a>

            <!-- Card 3: App in Progress -->
            <a href="/app/" class="card">
                <div class="card-info">
                    <div class="icon-wrapper">
                        <!-- Terminal/Code Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                    </div>
                    <div class="card-details">
                        <h2>App in Progress</h2>
                        <p>Exploring and building fresh dynamic tools</p>
                    </div>
                </div>
                <div class="arrow-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                </div>
            </a>

        </main>

        <footer>
            <p>&copy; 2026 JGUXD. All rights reserved.</p>
        </footer>

    </div>

</body>
</html>
