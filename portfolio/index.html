<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | JGUXD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(46, 125, 50, 0.2);
            --accent-green: #4caf50;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        .header {
            max-width: 1000px;
            margin: 0 auto 3rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }
        
        .back-btn:hover { color: var(--accent-green); }

        h1 { font-size: 2.5rem; letter-spacing: -1px; }

        .portfolio-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1.5rem;
        }

        @media (min-width: 640px) { .portfolio-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .portfolio-grid { grid-template-columns: repeat(3, 1fr); } }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: block;
        }

        .project-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-5px);
            background: rgba(17, 24, 39, 0.9);
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .project-card h2 { font-size: 1.1rem; margin-bottom: 0.25rem; }
        .project-card p { font-size: 0.85rem; color: var(--text-secondary); }
    </style>
</head>
<body>

    <header class="header">
        <a href="/" class="back-btn">← Back Home</a>
        <h1>Portfolio</h1>
    </header>

    <main class="portfolio-grid">
        <script>
            // Generating 9 project cards dynamically
            for(let i=1; i<=9; i++) {
                document.write(`
                    <a href="/portfolio/project-${i}/" class="project-card">
                        <div class="thumbnail">IMAGE PLACEHOLDER</div>
                        <h2>Project 0${i}</h2>
                        <p>Brief project description here.</p>
                    </a>
                `);
            }
        </script>
    </main>

</body>
</html>
